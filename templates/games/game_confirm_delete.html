{% extends 'base.html' %}

{% block title %}
    O'yinni O'chirish
{% endblock %}

{% block main %}
    <div class="game-card" style="max-width: 600px; margin: 0 auto; text-align: center;">
        <h1 style="color: #ef4444;">⚠️ O'chirishni tasdiqlang</h1>
        <hr>
        <p class="mb-4"><strong>"{{ game.title }}"</strong> o'yinini o'chirmoqchimisiz?</p>
        <p style="color: #ef4444; margin-bottom: 30px;">Bu amalni qaytarib bo'lmaydi!</p>
        
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">✅ Ha, o'chirish</button>
            <a href="{% url 'games:game_list' %}" class="btn btn-secondary">❌ Bekor qilish</a>
        </form>
    </div>
{% endblock %}
